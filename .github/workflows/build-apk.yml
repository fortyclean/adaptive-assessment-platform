name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Release APK (with production API)
        working-directory: mobile
        run: |
          flutter build apk --release \
            --dart-define=API_URL=https://eduassess-backend.onrender.com/api/v1

      - name: Rename APK
        run: |
          cp mobile/build/app/outputs/flutter-apk/app-release.apk \
             adaptive-mastery-v1.0.0.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-mastery-apk
          path: adaptive-mastery-v1.0.0.apk
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: adaptive-mastery-v1.0.0.apk
          name: "EduAssess ${{ github.ref_name }}"
          body: |
            ## 📱 EduAssess - منصة التقييم التكيفي الذكي

            ### تحميل التطبيق
            قم بتحميل ملف `adaptive-mastery-v1.0.0.apk` وتثبيته على هاتفك الأندرويد.

            ### بيانات الدخول التجريبية
            | الدور | اسم المستخدم | كلمة المرور |
            |-------|-------------|-------------|
            | مشرف | admin | Admin@123 |
            | معلم | teacher | Teacher@123 |
            | طالب | student | Student@123 |

            ### ملاحظة
            - يعمل التطبيق في وضع Demo بدون إنترنت
            - للاتصال بالـ Backend الحقيقي: https://eduassess-backend.onrender.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
