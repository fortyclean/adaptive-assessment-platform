version: '3.9'

services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0
    container_name: adaptive_assessment_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: adaptive_assessment
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - adaptive_network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Service
  redis:
    image: redis:7.2-alpine
    container_name: adaptive_assessment_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    networks:
      - adaptive_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: adaptive_assessment_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/adaptive_assessment?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production_min_32_chars
      JWT_EXPIRES_IN: 8h
      REFRESH_TOKEN_SECRET: dev_refresh_secret_change_in_production_min_32_chars
      REFRESH_TOKEN_EXPIRES_IN: 7d
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adaptive_network
    volumes:
      - ./src:/app/src:ro
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Development override — use this for local dev with hot reload
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: adaptive_assessment_backend_dev
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/adaptive_assessment?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production_min_32_chars
      JWT_EXPIRES_IN: 8h
      REFRESH_TOKEN_SECRET: dev_refresh_secret_change_in_production_min_32_chars
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adaptive_network
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    profiles:
      - dev

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  adaptive_network:
    driver: bridge
