name: adaptive_assessment
description: Adaptive Assessment Platform — Mobile App (Flutter)
publish_to: 'none'
version: 1.0.12+12

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP Client
  dio: ^5.4.3+1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # Fonts & UI
  google_fonts: ^6.2.1

  # Internationalization
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # Google Sign-In
  google_sign_in: ^6.2.1

  # File Picker
  file_picker: ^8.1.2

  # Share & Download
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Linting
  flutter_lints: ^4.0.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Regular.ttf
          weight: 400
        - asset: assets/fonts/Almarai-Bold.ttf
          weight: 700
        - asset: assets/fonts/Almarai-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Almarai-Light.ttf
          weight: 300
